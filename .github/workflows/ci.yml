name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: core-service/requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: pytest -v

  java-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: analytics-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: "maven"
      - run: mvn test -B

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  docker-build:
    needs: [python-tests, java-tests, frontend-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build --target production -t core-service:ci ./core-service
      - run: docker build --target production -t analytics-service:ci ./analytics-service
      - run: docker build --target production -t frontend:ci --build-arg VITE_API_BASE_URL=http://localhost:8000 ./frontend

  docker-push:
    needs: docker-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      # Skips cleanly (rather than failing the pipeline) if Docker Hub
      # secrets haven't been configured on this repo - see README for setup.
      - name: Check Docker Hub credentials are configured
        id: dockerhub
        run: |
          if [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Log in to Docker Hub
        if: steps.dockerhub.outputs.configured == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push images
        if: steps.dockerhub.outputs.configured == 'true'
        run: |
          docker build --target production \
            -t "${{ secrets.DOCKERHUB_USERNAME }}/url-shortener-core-service:latest" \
            ./core-service
          docker build --target production \
            -t "${{ secrets.DOCKERHUB_USERNAME }}/url-shortener-analytics-service:latest" \
            ./analytics-service
          docker build --target production \
            --build-arg VITE_API_BASE_URL=http://localhost:8000 \
            -t "${{ secrets.DOCKERHUB_USERNAME }}/url-shortener-frontend:latest" \
            ./frontend
          docker push "${{ secrets.DOCKERHUB_USERNAME }}/url-shortener-core-service:latest"
          docker push "${{ secrets.DOCKERHUB_USERNAME }}/url-shortener-analytics-service:latest"
          docker push "${{ secrets.DOCKERHUB_USERNAME }}/url-shortener-frontend:latest"
      - name: Skipped (no Docker Hub secrets configured)
        if: steps.dockerhub.outputs.configured == 'false'
        run: echo "DOCKERHUB_USERNAME/DOCKERHUB_TOKEN secrets not set - skipping push. See README for setup."
