server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        # SPA fallback: client-side routes like /dashboard have no
        # matching file on disk, so unmatched paths serve index.html
        # and React Router takes over from there.
        try_files $uri $uri/ /index.html;
    }
}
