# Hot-reload overrides for local development:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
#
# Compose deep-merges mapping fields (environment, build) across files, so
# this only needs to override what actually differs from docker-compose.yml -
# `target`, `command`, and the bind-mounted source volumes.
services:
  core-service:
    build:
      target: dev
    volumes:
      - ./core-service/app:/app/app
    command: sh -c "python -m app.db.init_db && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  analytics-service:
    build:
      target: dev
    volumes:
      - ./analytics-service/src:/build/src
      - ./analytics-service/pom.xml:/build/pom.xml
      - maven_cache:/root/.m2
    command: ["mvn", "spring-boot:run"]

  frontend:
    build:
      target: dev
      args:
        VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/build/src
      - ./frontend/index.html:/build/index.html
      - ./frontend/vite.config.js:/build/vite.config.js
    environment:
      VITE_API_BASE_URL: http://localhost:8000

volumes:
  maven_cache:
