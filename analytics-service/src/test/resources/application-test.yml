spring:
  datasource:
    url: jdbc:h2:mem:analytics_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_schema: analytics
  sql:
    init:
      mode: always
